<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400" role="img"
     width="100%" height="400" preserveAspectRatio="xMidYMid meet"
     aria-label="Altimetría de la ruta Ruta Monumental de Salamanca">
  <title>Altimetría – Ruta Monumental de Salamanca</title>
  <desc>Perfil de alturas de la ruta Ruta Monumental de Salamanca, distancia total 1.4 km</desc>

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#f8f8f0" stroke="#ccc"/>

  <!-- Título -->
  <text x="400" y="20" text-anchor="middle"
        font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#8b1a1a">
    Altimetría – Ruta Monumental de Salamanca
  </text>

  <!-- Cuadrícula y eje Y (altitud en metros) -->
  <line x1="80" y1="211.2" x2="770" y2="211.2" stroke="#ddd" stroke-width="1"/>
  <text x="72" y="215.2" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#555">800 m</text>
  <line x1="80" y1="30.0" x2="770" y2="30.0" stroke="#ddd" stroke-width="1"/>
  <text x="72" y="34.0" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#555">900 m</text>

  <!-- Eje Y – etiqueta vertical -->
  <text x="15" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333" transform="rotate(-90, 15, 175)">
    Altitud (m)
  </text>

  <!-- Eje X (distancia en km) y marcas -->
  <line x1="80.0" y1="320" x2="80.0" y2="325" stroke="#333" stroke-width="1"/>
  <text x="80.0" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">0.0</text>
  <line x1="425.0" y1="320" x2="425.0" y2="325" stroke="#333" stroke-width="1"/>
  <text x="425.0" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">0.7</text>
  <line x1="770.0" y1="320" x2="770.0" y2="325" stroke="#333" stroke-width="1"/>
  <text x="770.0" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">1.4</text>
  <text x="425" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Distancia (km)</text>

  <!-- Ejes principales -->
  <line x1="80" y1="30" x2="80" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="320" x2="770" y2="320" stroke="#333" stroke-width="2"/>

  <!-- Perfil de altimetría: polilínea cerrada -->
  <polygon points="80.0,211.2 80.0,211.2 258.9,214.9 361.1,220.3 514.4,223.9 770.0,229.4 770.0,320.0 80.0,320.0"
           fill="rgba(139,26,26,0.2)" stroke="#8b1a1a" stroke-width="2"/>

  <!-- Hitos con etiquetas -->
  <circle cx="80.0" cy="211.2" r="5" fill="#8b1a1a" stroke="white" stroke-width="1.5"/>
  <text x="80.0" y="201.2" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#333">
    Plaza Mayor
  </text>
  <circle cx="80.0" cy="211.2" r="5" fill="#8b1a1a" stroke="white" stroke-width="1.5"/>
  <text x="80.0" y="201.2" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#333">
    Plaza Mayor
  </text>
  <circle cx="258.9" cy="214.9" r="5" fill="#8b1a1a" stroke="white" stroke-width="1.5"/>
  <text x="258.9" y="204.9" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#333">
    Casa de las Conchas
  </text>
  <circle cx="361.1" cy="220.3" r="5" fill="#8b1a1a" stroke="white" stroke-width="1.5"/>
  <text x="361.1" y="210.3" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#333">
    Universidad de Salam…
  </text>
  <circle cx="514.4" cy="223.9" r="5" fill="#8b1a1a" stroke="white" stroke-width="1.5"/>
  <text x="514.4" y="213.9" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#333">
    Catedral Nueva de Sa…
  </text>
  <circle cx="770.0" cy="229.4" r="5" fill="#8b1a1a" stroke="white" stroke-width="1.5"/>
  <text x="770.0" y="219.4" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#333">
    Puente Romano
  </text>
</svg>